<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SherigSpace — Login / Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8c97a;--navy:#0779a3;--navy2:#1a2340;--navy3:#0a4567;--surface:#192035;--border:rgba(201,168,76,0.2);--text:#e8e4dc;--text2:#9aa3b8;--red:#e05c5c;--green:#4caf84}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0f1623 0%,#1a2340 60%,#1a2f50 100%)}
.bg::before{content:'';position:absolute;top:-100px;right:-100px;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.08) 0%,transparent 70%)}
.bg::after{content:'';position:absolute;bottom:-80px;left:-80px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.05) 0%,transparent 70%)}
.wrap{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.brand{text-align:center;margin-bottom:2rem}
.brand h1{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);letter-spacing:.02em}
.brand p{font-size:.85rem;color:var(--text2);margin-top:.3rem}
.card{background:rgba(25,32,53,.95);border:1px solid var(--border);border-radius:10px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.4)}
.tabs{display:grid;grid-template-columns:1fr 1fr}
.tab{padding:1rem;text-align:center;font-weight:600;font-size:.9rem;cursor:pointer;color:var(--text2);background:rgba(255,255,255,.03);border-bottom:2px solid transparent;transition:all .2s}
.tab.on{color:var(--gold);background:transparent;border-bottom-color:var(--gold)}
.forms{padding:1.8rem}
.form{display:none;flex-direction:column;gap:1rem}
.form.on{display:flex}
.field{display:flex;flex-direction:column;gap:.35rem}
.field label{font-size:.76rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.07em}
.field input,.field select{background:#202b4a;border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.92rem;padding:11px 13px;outline:none;transition:border-color .2s;width:100%}
.field input:focus,.field select:focus{border-color:var(--gold)}
.field input::placeholder{color:rgba(255,255,255,.25)}
.field select option{background:#1a2340}
.btn{width:100%;padding:12px;background:var(--gold);color:var(--navy2);border:none;border-radius:5px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s,transform .15s;margin-top:.3rem}
.btn:hover{background:var(--gold-light);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
.msg{font-size:.82rem;padding:10px 13px;border-radius:5px;display:none}
.msg.err{background:rgba(224,92,92,.12);border:1px solid rgba(224,92,92,.3);color:#f09090;display:block}
.msg.ok{background:rgba(76,175,132,.12);border:1px solid rgba(76,175,132,.3);color:#7ed9b0;display:block}
.hint{font-size:.78rem;color:var(--text2);text-align:center}
.hint a{color:var(--gold);cursor:pointer;text-decoration:none}
.hint a:hover{text-decoration:underline}
.strength{height:3px;border-radius:2px;margin-top:4px;background:var(--border);overflow:hidden}
.strength-bar{height:100%;width:0;border-radius:2px;transition:width .3s,background .3s}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal.show{display:flex}
.modal-box{width:100%;max-width:400px;background:rgba(25,32,53,.98);border:1px solid var(--border);border-radius:10px;padding:1.5rem;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-box h2{color:var(--gold);margin-bottom:.5rem;font-size:1.3rem}
.modal-text{color:var(--text2);font-size:.85rem;margin-bottom:1rem}
.modal-actions{display:flex;gap:.7rem;margin-top:1rem}
.cancel-btn{background:#39415f;color:var(--text)}
.cancel-btn:hover{background:#4a5375}
footer{position:relative;z-index:1;text-align:center;padding:1.2rem;font-size:.78rem;color:rgba(255,255,255,.25)}
footer span{color:var(--gold)}
</style>
</head>
<body>
<div class="bg"></div>

<div class="wrap">
  <div class="brand">
    <h1>SherigSpace</h1>
    <p>Your Teaching & Learning Portal</p>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab on" onclick="switchTab('login')">Log In</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <div class="forms">

      <!-- LOGIN -->
      <div class="form on" id="f-login">
        <div id="login-msg" class="msg"></div>
        <div class="field">
          <label>Email</label>
          <input id="l-email" type="email" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="l-pass" type="password" placeholder="Your password"/>
        </div>
        <p class="hint" style="text-align:right;margin-top:-8px;">
          <a onclick="openForgotPassword()">Forgot Password?</a>
        </p>
        <button class="btn" id="login-btn" onclick="doLogin()">Log In</button>
        <p class="hint">Don't have an account? <a onclick="switchTab('signup')">Sign up here</a></p>
      </div>

      <!-- SIGNUP -->
      <div class="form" id="f-signup">
        <div id="signup-msg" class="msg"></div>
        <div class="field">
          <label>Full Name</label>
          <input id="s-name" type="text" placeholder="e.g. Tenzin Dorji"/>
        </div>
        <div class="field">
          <label>Email</label>
          <input id="s-email" type="email" placeholder="you@example.com"/>
        </div>
        <div class="field">
          <label>Class / Grade</label>
          <select id="s-class">
            <option value="">-- Select your class --</option>
            <option>Class 1</option><option>Class 2</option><option>Class 3</option>
            <option>Class 4</option><option>Class 5</option><option>Class 6</option>
            <option>Class 7</option><option>Class 8</option><option>Class 9</option>
            <option>Class 10</option><option>Class 11</option><option>Class 12</option>
            <option>Teacher / Educator</option><option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Password</label>
          <input id="s-pass" type="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)"/>
          <div class="strength"><div class="strength-bar" id="sbar"></div></div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input id="s-pass2" type="password" placeholder="Repeat password"/>
        </div>
        <button class="btn" id="signup-btn" onclick="doSignup()">Create Account</button>
        <p class="hint">Already have an account? <a onclick="switchTab('login')">Log in here</a></p>
      </div>

    </div>
  </div>
</div>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgotModal" class="modal">
  <div class="modal-box">
    <h2>Reset Password</h2>
    <p class="modal-text">Enter your email and we'll send you a reset link.</p>
    <div id="forgot-msg" class="msg"></div>
    <div class="field">
      <label>Email</label>
      <input id="fp-email" type="email" placeholder="you@example.com"/>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="resetPassword()">Send Reset Link</button>
      <button class="btn cancel-btn" onclick="closeForgotPassword()">Cancel</button>
    </div>
  </div>
</div>

<footer>© 2026 <span>SherigSpace</span></footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// ── PASTE YOUR SUPABASE CREDENTIALS HERE ──
const SUPABASE_URL = 'https://kgqlcjdjdhssactfezwi.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtncWxjamRqZGhzc2FjdGZlendpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NTE2MzQsImV4cCI6MjA5NTAyNzYzNH0.6hJpg9Zput8wnuDfq7wzb5dRC2KkuRmkmaz870U0Lto';
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// ── HELPERS ──
function showMsg(id, msg, type){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'msg ' + type;
}

function setLoading(btnId, loading, label=''){
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  if(label) btn.textContent = loading ? '...' : label;
}

// ── TAB SWITCH ──
window.switchTab = function(t){
  document.querySelectorAll('.tab').forEach((el,i) =>
    el.classList.toggle('on', (t==='login'&&i===0)||(t==='signup'&&i===1))
  );
  document.getElementById('f-login').classList.toggle('on', t==='login');
  document.getElementById('f-signup').classList.toggle('on', t==='signup');
};

// ── PASSWORD STRENGTH ──
window.checkStrength = function(v){
  const bar = document.getElementById('sbar');
  let score = 0;
  if(v.length>=6) score++;
  if(v.length>=10) score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  const pct = [0,20,40,65,85,100][score];
  const col = ['#e05c5c','#e05c5c','#e8a84c','#c9a84c','#4caf84','#4caf84'][score];
  bar.style.width = pct + '%';
  bar.style.background = col;
};

// ── SIGN UP ──
window.doSignup = async function(){
  const name       = document.getElementById('s-name').value.trim();
  const email      = document.getElementById('s-email').value.trim().toLowerCase();
  const classGrade = document.getElementById('s-class').value;
  const pass       = document.getElementById('s-pass').value;
  const pass2      = document.getElementById('s-pass2').value;

  if(!name){ showMsg('signup-msg','Please enter your full name.','err'); return; }
  if(!classGrade){ showMsg('signup-msg','Please select your class/grade.','err'); return; }
  if(pass.length < 6){ showMsg('signup-msg','Password must be at least 6 characters.','err'); return; }
  if(pass !== pass2){ showMsg('signup-msg','Passwords do not match.','err'); return; }

  setLoading('signup-btn', true, 'Create Account');
  showMsg('signup-msg','','');

  try {
    // 1. Create auth user
    const { data, error } = await supabase.auth.signUp({ email, password: pass });
    if(error) throw error;

    // data.user can be null if email confirmation is still on in Supabase
    const uid = data.user?.id || data.session?.user?.id;
    if(!uid){
      showMsg('signup-msg', '✅ Check your email to confirm your account, then log in.', 'ok');
      setLoading('signup-btn', false, 'Create Account');
      return;
    }

    // 2. Save profile to profiles table
    const { error: profileErr } = await supabase.from('profiles').upsert({
      id: uid,
      name,
      email,
      class_grade: classGrade,
      role: 'user'
    });
    if(profileErr) throw profileErr;

    showMsg('signup-msg', '✅ Account created! Redirecting…', 'ok');
    setTimeout(() => window.location.href = 'index.html', 1200);

  } catch(err) {
    showMsg('signup-msg', '❌ ' + (err.message || 'Sign-up failed.'), 'err');
  } finally {
    setLoading('signup-btn', false, 'Create Account');
  }
};

// ── LOGIN ──
window.doLogin = async function(){
  const email = document.getElementById('l-email').value.trim().toLowerCase();
  const pass  = document.getElementById('l-pass').value;

  if(!email || !pass){ showMsg('login-msg','Please enter your email and password.','err'); return; }

  setLoading('login-btn', true, 'Log In');
  showMsg('login-msg','','');

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
    if(error) throw error;

    // Fetch profile
    const { data: profile } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', data.user.id)
      .single();

    // Store session info for UI use
    localStorage.setItem('edu_session', JSON.stringify({
      id: data.user.id,
      name: profile?.name || email,
      email: email,
      role: profile?.role || 'user',
      class_grade: profile?.class_grade || ''
    }));

    window.location.href = 'index.html';

  } catch(err) {
    showMsg('login-msg', '❌ ' + (err.message || 'Login failed.'), 'err');
  } finally {
    setLoading('login-btn', false, 'Log In');
  }
};

// ── FORGOT PASSWORD ──
window.openForgotPassword  = () => document.getElementById('forgotModal').classList.add('show');
window.closeForgotPassword = () => {
  document.getElementById('forgotModal').classList.remove('show');
  document.getElementById('forgot-msg').className = 'msg';
};

window.resetPassword = async function(){
  const email = document.getElementById('fp-email').value.trim().toLowerCase();
  if(!email){ showMsg('forgot-msg','Please enter your email.','err'); return; }

  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    if(error) throw error;
    showMsg('forgot-msg','✅ Reset link sent! Check your email.','ok');
    setTimeout(closeForgotPassword, 2500);
  } catch(err) {
    showMsg('forgot-msg','❌ ' + (err.message || 'Failed to send reset link.'),'err');
  }
};

// ── AUTO REDIRECT IF ALREADY LOGGED IN ──
(async () => {
  const { data } = await supabase.auth.getSession();
  if(data.session) window.location.href = 'index.html';
})();
</script>
</body>
</html>
