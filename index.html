<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SherigSpace</title>
<link href="https://fonts.googleapis.com/css2?family=Jomolhari&family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
@font-face{font-family:'DDC Joyig';src:url('DDC_Joyig.ttf') format('truetype'),url('DDC_Joyig.otf') format('opentype');font-weight:normal;font-style:normal;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--gold-light:#e8c97a;--font-en:'DM Sans',sans-serif;--font-dz:'Jomolhari','DDC Joyig','Noto Serif Tibetan',sans-serif}
[data-theme="dark"]{--bg:#0f1623;--surface:#1a2340;--card-bg:#192035;--card-border:#2a3556;--border:rgba(201,168,76,0.18);--text:#e8e4dc;--text2:#9aa3b8;--nav-bg:rgba(13,18,30,0.97);--section-alt:#131c2e;--footer-bg:#080d14;--hero1:#0f1623;--hero2:#1a2340;--hero3:#1a2f50;--navy:#1a2340;--navy-light:#253056;--input-bg:#202b4a}
[data-theme="light"]{--bg:#f8f5ef;--surface:#ffffff;--card-bg:#f8f5ef;--card-border:#e5dece;--border:rgba(201,168,76,0.25);--text:#1a2340;--text2:#6b7280;--nav-bg:rgba(26,35,64,0.97);--section-alt:#f1ede6;--footer-bg:#111827;--hero1:#1a2340;--hero2:#253056;--hero3:#1e3a5f;--navy:#1a2340;--navy-light:#253056;--input-bg:#e8e3da}
html{scroll-behavior:smooth}
body{font-family:var(--font-en);background:var(--bg);color:var(--text);overflow-x:hidden;transition:background .35s,color .35s}
[data-lang="dz"] h1,[data-lang="dz"] h2,[data-lang="dz"] h3,[data-lang="dz"] h4,[data-lang="dz"] p,[data-lang="dz"] span:not(.t-icon),[data-lang="dz"] a,[data-lang="dz"] li,[data-lang="dz"] button{font-family:var(--font-dz)!important;line-height:2;letter-spacing:0}
[data-lang="dz"] .hero-title,[data-lang="dz"] .section-title{font-family:'Jomolhari',sans-serif!important;line-height:1.8}
/* ── ANNOUNCEMENT BANNER ── */
#announce-bar{display:none;position:fixed;top:68px;left:0;right:0;z-index:195;background:linear-gradient(90deg,#7c3a00,#c9a84c,#7c3a00);background-size:200% auto;animation:shimmer 3s linear infinite;padding:.55rem 1rem;text-align:center;font-size:.82rem;font-weight:600;color:#1a2340;letter-spacing:.02em}
#announce-bar.show{display:block}
#announce-bar .ann-close{position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:#1a2340;font-size:1rem;cursor:pointer;opacity:.7;padding:2px 6px}
#announce-bar .ann-close:hover{opacity:1}
#announce-bar a{color:#1a2340;font-weight:700;text-decoration:underline;margin-left:.4rem}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}

nav{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--nav-bg);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:68px;border-bottom:1px solid var(--border);gap:1rem}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--gold);text-decoration:none;flex-shrink:0}
.nav-links{display:flex;gap:1.8rem;list-style:none}
.nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.85rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;transition:color .2s;position:relative;padding-bottom:4px}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--gold);transition:width .25s}
.nav-links a:hover{color:var(--gold)}.nav-links a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.lang-toggle{display:flex;background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.lang-btn{padding:4px 9px;font-size:.73rem;font-weight:600;color:rgba(255,255,255,.5);background:transparent;border:none;cursor:pointer;transition:background .2s,color .2s;line-height:1.4}
.lang-btn[data-lang-btn="dz"]{font-family:'Jomolhari',sans-serif;font-size:.78rem}
.lang-btn.on{background:var(--gold);color:#1a2340;border-radius:18px}
.theme-toggle{width:42px;height:22px;background:rgba(255,255,255,.1);border:1px solid var(--border);border-radius:11px;position:relative;cursor:pointer;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;background:var(--gold);border-radius:50%;transition:transform .3s}
[data-theme="light"] .theme-toggle::after{transform:translateX(20px)}
.t-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:.62rem;pointer-events:none;transition:opacity .3s}
.t-icon.moon{left:4px}.t-icon.sun{right:4px;opacity:0}
[data-theme="light"] .t-icon.moon{opacity:0}[data-theme="light"] .t-icon.sun{opacity:1}
.user-btn{display:flex;align-items:center;gap:.45rem;padding:5px 11px;background:rgba(201,168,76,.12);border:1px solid var(--border);border-radius:20px;cursor:pointer;color:var(--gold);font-size:.8rem;font-weight:600;transition:background .2s;position:relative}
.user-btn:hover{background:rgba(201,168,76,.22)}
.user-avatar{width:22px;height:22px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#1a2340;font-weight:700}
.user-dropdown{position:absolute;top:calc(100%+8px);right:0;background:#131c2e;border:1px solid var(--border);border-radius:6px;min-width:160px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:300;display:none}
.user-btn:focus-within .user-dropdown,.user-dropdown:hover{display:block}
.udrop-item{display:block;padding:.65rem 1rem;font-size:.83rem;color:var(--text2);cursor:pointer;transition:background .15s;text-decoration:none;border:none;background:none;width:100%;text-align:left;font-family:var(--font-en)}
.udrop-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.udrop-item.danger{color:#e05c5c}.udrop-item.danger:hover{background:rgba(224,92,92,.08)}
.udrop-sep{height:1px;background:var(--border);margin:.2rem 0}
.login-btn{padding:6px 14px;background:var(--gold);border:none;border-radius:3px;color:#1a2340;font-size:.8rem;font-weight:700;cursor:pointer;font-family:var(--font-en);transition:background .2s;text-decoration:none;display:inline-block}
.login-btn:hover{background:var(--gold-light)}
#home{min-height:100vh;background:linear-gradient(135deg,var(--hero1) 0%,var(--hero2) 60%,var(--hero3) 100%);display:flex;align-items:center;padding:100px 5% 60px;position:relative;overflow:hidden}
#home::before{content:'';position:absolute;top:-80px;right:-80px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%);pointer-events:none}
#home::after{content:'';position:absolute;bottom:-60px;left:10%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 70%);pointer-events:none}
.hero-inner{max-width:1100px;margin:auto;display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.hero-tag{display:inline-block;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);color:var(--gold-light);font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;border-radius:2px;margin-bottom:1.5rem;animation:fadeUp .7s ease both}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.1rem,4.5vw,3.6rem);font-weight:700;color:#fff;line-height:1.15;margin-bottom:1.2rem;animation:fadeUp .8s .1s ease both}
.hero-title span{color:var(--gold)}
.hero-desc{color:rgba(255,255,255,.65);font-size:1rem;line-height:1.8;margin-bottom:2.2rem;animation:fadeUp .8s .2s ease both}
.hero-cta{display:flex;gap:1rem;flex-wrap:wrap;animation:fadeUp .8s .3s ease both}
.btn-primary{background:var(--gold);color:var(--navy);padding:12px 26px;border-radius:3px;font-weight:600;font-size:.9rem;text-decoration:none;transition:background .2s,transform .15s;display:inline-block;border:none;cursor:pointer;font-family:var(--font-en)}
.btn-primary:hover{background:var(--gold-light);transform:translateY(-2px)}
.btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.35);color:rgba(255,255,255,.85);padding:12px 26px;border-radius:3px;font-weight:500;font-size:.9rem;text-decoration:none;transition:border-color .2s,color .2s,transform .15s;display:inline-block}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px)}
.hero-stats{display:flex;flex-direction:column;gap:1.5rem;animation:fadeUp .9s .35s ease both}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.2);border-left:3px solid var(--gold);border-radius:4px;padding:1.2rem 1.5rem}
.stat-card h3{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);font-weight:700}
.stat-card p{font-size:.82rem;color:rgba(255,255,255,.55);margin-top:2px;text-transform:uppercase;letter-spacing:.07em}
section{padding:80px 5%}
.inner{max-width:1100px;margin:auto}
.section-label{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:.6rem}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(1.9rem,3.5vw,2.7rem);font-weight:700;color:var(--text);line-height:1.2;margin-bottom:.8rem;transition:color .35s}
.section-desc{color:var(--text2);font-size:1rem;line-height:1.75;max-width:560px;margin-bottom:3rem;transition:color .35s}
.divider{width:48px;height:3px;background:var(--gold);border-radius:2px;margin:1rem 0 1.5rem}
#lessons{background:var(--surface);transition:background .35s}
.lessons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.8rem}
.lesson-card{background:var(--card-bg);border:1px solid var(--card-border);border-top:3px solid var(--gold);border-radius:5px;padding:1.8rem;transition:transform .2s,box-shadow .2s,background .35s;cursor:pointer}
.lesson-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.18)}
.lesson-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;margin-bottom:1rem}
.lesson-card h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:.5rem;transition:color .35s}
.lesson-card p{font-size:.88rem;color:var(--text2);line-height:1.6;margin-bottom:1rem;transition:color .35s}
.lesson-meta{display:flex;gap:.8rem;flex-wrap:wrap;font-size:.76rem;color:var(--text2)}
.badge{display:inline-block;background:rgba(201,168,76,.15);font-size:.7rem;font-weight:600;letter-spacing:.06em;padding:3px 9px;border-radius:20px;text-transform:uppercase;margin-bottom:.8rem;color:#8a6820}
[data-theme="dark"] .badge{color:var(--gold-light)}
#resources{background:var(--section-alt);transition:background .35s}
.resources-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.5rem}
.resource-card{background:var(--surface);border:1px solid var(--card-border);border-radius:5px;padding:1.5rem;display:flex;align-items:flex-start;gap:1rem;transition:transform .2s,box-shadow .2s;cursor:pointer;text-decoration:none;position:relative;overflow:hidden}
.resource-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.14)}
.resource-icon{width:40px;height:40px;flex-shrink:0;background:var(--navy);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.resource-info h4{font-weight:600;font-size:.93rem;color:var(--text);margin-bottom:.3rem;transition:color .35s}
.resource-info p{font-size:.8rem;color:var(--text2);line-height:1.5;transition:color .35s}
.resource-type{font-size:.7rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-top:.4rem;font-family:var(--font-en)!important}



.lesson-card, .resource-card, .video-card, .blog-card,
.lesson-card *, .resource-card *, .video-card *, .blog-card *{
  -webkit-user-select: none !important;
  -moz-user-select: none !important;
  user-select: none !important;
}
</style>


<div id="devtools-block">
  <div style="font-size:3rem">🚫</div>
  <h2>Developer Tools Detected</h2>
  <p>For content protection, this site cannot be viewed while developer tools are open. Please close DevTools and refresh the page.</p>
  <button onclick="location.reload()" style="padding:10px 24px;background:#c9a84c;color:#1a2340;border:none;border-radius:4px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.9rem">↺ Refresh Page</button>
</div>

<script>
// ═══════════════════════════════════════════
//  CONTENT PROTECTION SUITE — SherigSpace
// ═══════════════════════════════════════════

(function(){

  // ── 1. DISABLE RIGHT-CLICK ──
  document.addEventListener('contextmenu', e => e.preventDefault());

  // ── 2. DISABLE TEXT SELECTION & DRAG ──
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('dragstart',   e => e.preventDefault());

  // ── 3. DISABLE COPY / CUT / PASTE ──
  document.addEventListener('copy',  e => e.preventDefault());
  document.addEventListener('cut',   e => e.preventDefault());

  // ── 4. DISABLE KEYBOARD SHORTCUTS ──
  document.addEventListener('keydown', function(e){
    const ctrl = e.ctrlKey || e.metaKey;
    const key  = e.key.toLowerCase();

    // Ctrl+S (save), Ctrl+U (source), Ctrl+P (print),
    // Ctrl+A (select all), Ctrl+C (copy), F12, Ctrl+Shift+I/J/C
    if(
      (ctrl && ['s','u','p','a','c'].includes(key)) ||
      e.key === 'F12' ||
      (ctrl && e.shiftKey && ['i','j','c','k'].includes(key)) ||
      (ctrl && e.key === 'F5')
    ){
      e.preventDefault();
      e.stopPropagation();
      return false;
    }

    // PrintScreen key
    if(e.key === 'PrintScreen'){
      navigator.clipboard?.writeText('').catch(()=>{});
      e.preventDefault();
    }
  }, true);

  // ── 5. DISABLE PRINT ──
  window.addEventListener('beforeprint', e => {
    e.preventDefault();
    // Replace content with blank during print
    document.body.style.visibility = 'hidden';
    setTimeout(() => document.body.style.visibility = '', 500);
  });

  // ── 6. DEVTOOLS DETECTION (desktop only) ──
  // Skipped on mobile — iOS/Android console panels falsely trigger size checks
  const blocker = document.getElementById('devtools-block');
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  if(!isMobile){
    let devtoolsOpen = false;
    function checkDevTools(){
      const threshold = 300; // high threshold avoids false positives from browser chrome
      const open = (window.outerWidth - window.innerWidth) > threshold ||
                   (window.outerHeight - window.innerHeight) > threshold;
      if(open !== devtoolsOpen){
        devtoolsOpen = open;
        blocker.classList.toggle('show', open);
        document.body.style.overflow = open ? 'hidden' : '';
      }
    }
    setInterval(checkDevTools, 1000);
    window.addEventListener('resize', checkDevTools);
  }

})();

// ── 7. WATERMARK — draws user name/email diagonally across the page ──
function initWatermark(){
  const s = (() => { try{ return JSON.parse(localStorage.getItem('edu_session')||'null') }catch{ return null } })();
  if(!s) return; // no watermark for logged-out visitors

  const layer  = document.getElementById('wm-layer');
  const canvas = document.getElementById('wm-canvas');
  const ctx    = canvas.getContext('2d');

  const label = `${s.name}  ·  ${s.email}  ·  SherigSpace`;

  function draw(){
    const W = window.innerWidth;
    const H = window.innerHeight;
    canvas.width  = W;
    canvas.height = H;

    ctx.clearRect(0, 0, W, H);
    ctx.save();

    ctx.font      = '13px DM Sans, sans-serif';
    ctx.fillStyle = 'rgba(201,168,76,0.07)';
    ctx.rotate(-Math.PI / 6); // 30° diagonal

    const spacing = 280;
    const cols = Math.ceil(W / spacing) + 4;
    const rows = Math.ceil(H / spacing) + 4;

    for(let r = -2; r < rows; r++){
      for(let c = -2; c < cols; c++){
        ctx.fillText(label, c * spacing, r * spacing);
      }
    }

    ctx.restore();
    layer.classList.add('on');
  }

  draw();
  // Only redraw on resize, not scroll - canvas is fixed position
  let resizeTick=false;
  window.addEventListener('resize',()=>{
    if(resizeTick) return;
    resizeTick=true;
    setTimeout(()=>{ draw(); resizeTick=false; }, 200);
  });
}

// Init watermark after session is synced
window.addEventListener('edu:sessionReady', initWatermark);

// ── 8. VISIBILITY CHANGE — blur content when tab is not active during screen record ──
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden'){
    document.body.style.filter = 'blur(12px)';
  } else {
    document.body.style.filter = '';
  }
});

</script>
</body>
</html>
